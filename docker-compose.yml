version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-dashboard-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
